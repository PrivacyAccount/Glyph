name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Read app version
        id: meta
        shell: powershell
        run: |
          $v = node -p "require('./package.json').version"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Install
        run: npm ci
      - name: Prepare bundled MPV (Windows)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "vendor\mpv" | Out-Null
          choco install mpv -y --no-progress
          $mpvCmd = Get-Command mpv.exe -ErrorAction SilentlyContinue
          $mpvPath = $null
          if ($mpvCmd) { $mpvPath = $mpvCmd.Source }
          if (-not $mpvPath) {
            $candidate = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter mpv.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($candidate) { $mpvPath = $candidate.FullName }
          }
          if (-not $mpvPath) { throw "mpv.exe not found after Chocolatey install" }
          Copy-Item $mpvPath "vendor\mpv\mpv.exe" -Force
          Write-Host "Bundled mpv from: $mpvPath"
      - name: Build Windows Client + Server
        run: |
          npm run build:client
          npx electron-builder --config electron-builder.client.json --win nsis --publish never
          npx electron-builder --config electron-builder.server.json --win nsis --publish never
      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-client-windows-${{ steps.meta.outputs.version }}
          path: |
            dist-client/*Setup*.exe
      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-server-windows-${{ steps.meta.outputs.version }}
          path: |
            dist-server/*Setup*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Read app version
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Install
        run: npm ci
      - name: Prepare bundled MPV (Linux)
        run: |
          mkdir -p vendor/mpv
          sudo apt-get update
          sudo apt-get install -y mpv
          MPV_PATH="$(command -v mpv || true)"
          if [ -z "$MPV_PATH" ]; then
            echo "mpv not found after apt install"
            exit 1
          fi
          cp "$MPV_PATH" vendor/mpv/mpv
          chmod +x vendor/mpv/mpv
          echo "Bundled mpv from: $MPV_PATH"
      - name: Build client frontend
        run: npm run build:client
      - name: Build Linux Client AppImage
        run: npx electron-builder --config electron-builder.client.json --linux AppImage --publish never
      - name: Build Linux Server AppImage
        run: npx electron-builder --config electron-builder.server.json --linux AppImage --publish never
      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-client-linux-${{ steps.meta.outputs.version }}
          path: |
            dist-client/*.AppImage
      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-server-linux-${{ steps.meta.outputs.version }}
          path: |
            dist-server/*.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Read app version
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Install
        run: npm ci
      - name: Prepare bundled MPV (macOS)
        run: |
          mkdir -p vendor/mpv
          brew update
          brew install mpv
          MPV_PATH="$(command -v mpv || true)"
          if [ -z "$MPV_PATH" ]; then
            echo "mpv not found after brew install"
            exit 1
          fi
          cp "$MPV_PATH" vendor/mpv/mpv
          chmod +x vendor/mpv/mpv
          echo "Bundled mpv from: $MPV_PATH"
      - name: Build client frontend
        run: npm run build:client
      - name: Build macOS Client ZIP
        run: npx electron-builder --config electron-builder.client.json --mac zip --publish never
      - name: Build macOS Server ZIP
        run: npx electron-builder --config electron-builder.server.json --mac zip --publish never
      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-client-macos-${{ steps.meta.outputs.version }}
          path: |
            dist-client/*.zip
      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glyph-server-macos-${{ steps.meta.outputs.version }}
          path: |
            dist-server/*.zip
